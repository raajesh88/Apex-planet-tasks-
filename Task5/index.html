<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Final Web Project</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navigation -->
    <nav class="navbar">

        <h1>My E-Commerce Site</h1>

        <ul>
            <li><a href="#home">Home</a></li>

            <li><a href="#products">Products</a></li>

            <li><a href="#cart">Cart</a></li>

            <li><a href="#contact">Contact</a></li>
        </ul>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="hero">

        <h2>Welcome to My Store</h2>

        <p>Buy quality products at affordable prices.</p>

        <button>Shop Now</button>
    </section>

    <!-- Products -->
    <section id="products" class="products-section">

        <h2>Products</h2>

        <div class="product-container">

            <div class="product-card">
                <img
                    src="https://picsum.photos/300/200?1"
                    alt="Laptop"
                    loading="lazy"
                >

                <h3>Laptop</h3>

                <p>₹50,000</p>

                <button onclick="addToCart('Laptop')">
                    Add to Cart
                </button>
            </div>

            <div class="product-card">
                <img
                    src="https://picsum.photos/300/200?2"
                    alt="Mobile"
                    loading="lazy"
                >

                <h3>Mobile</h3>

                <p>₹20,000</p>

                <button onclick="addToCart('Mobile')">
                    Add to Cart
                </button>
            </div>

            <div class="product-card">
                <img
                    src="https://picsum.photos/300/200?3"
                    alt="Shoes"
                    loading="lazy"
                >

                <h3>Shoes</h3>

                <p>₹3,000</p>

                <button onclick="addToCart('Shoes')">
                    Add to Cart
                </button>
            </div>

        </div>
    </section>

    <!-- Cart -->
    <section id="cart" class="cart-section">

        <h2>Shopping Cart</h2>

        <ul id="cartList"></ul>
    </section>

    <!-- Contact -->
    <section id="contact" class="contact-section">

        <h2>Contact Us</h2>

        <input type="text" placeholder="Enter Name">

        <input type="email" placeholder="Enter Email">

        <textarea placeholder="Enter Message"></textarea>

        <button>Send</button>
    </section>

    <script src="script.js"></script>

</body>
</html>
